<div class="container">

<h1>🔐 Secret</h1>

<div class="card">
<p>Enter password:</p>
<input type="password" id="pass">
<br><br>
<button onclick="check()">Unlock</button>
<p id="msg"></p>
</div>

<div id="hidden" style="display:none;" class="card">
<p>You are not just a memory... you are a feeling that stayed forever.</p>
</div>

</div>

<script>
function check(){
    let p = document.getElementById("pass").value;

    if(p === "rahma"){
        document.getElementById("hidden").style.display = "block";
        document.body.style.background = "radial-gradient(circle, #00ffcc, black)";
    } else {
        document.getElementById("msg").innerHTML = "Wrong password...";
        document.body.style.background = "radial-gradient(circle, #ff0044, black)";
    }
}
</script>
